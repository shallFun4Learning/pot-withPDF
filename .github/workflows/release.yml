name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-bundles:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            artifact_name: bundle-ubuntu
          - platform: windows-latest
            artifact_name: bundle-windows
          - platform: macos-latest
            artifact_name: bundle-macos

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install pnpm globally
        run: |
          npm install -g pnpm@9
          pnpm --version

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target
            ./src-tauri/crates/pdf_io -> target

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libsoup2.4-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish hygiene check
        run: pnpm run check:publish

      - name: Build Tauri bundles (Linux)
        if: runner.os == 'Linux'
        run: ./scripts/tauri-build-linux.sh

      - name: Build Tauri bundles (macOS/Windows)
        if: runner.os != 'Linux'
        run: pnpm tauri build

      - name: Collect distributable bundles
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import shutil
          import sys

          root = Path("src-tauri/target/release/bundle")
          if not root.exists():
              print("Bundle directory does not exist", file=sys.stderr)
              sys.exit(1)

          allowed_suffixes = (
              ".AppImage",
              ".deb",
              ".rpm",
              ".dmg",
              ".msi",
              ".exe",
              ".zip",
              ".tar.gz",
              ".pkg",
          )
          excluded_names = {"control.tar.gz", "data.tar.gz", "debian-binary"}
          excluded_fragments = (".app/", "AppDir/")

          candidates = []
          for path in root.rglob("*"):
              if not path.is_file():
                  continue

              rel = path.as_posix()
              if any(fragment in rel for fragment in excluded_fragments):
                  continue
              if path.name in excluded_names:
                  continue
              if rel.endswith(allowed_suffixes):
                  candidates.append(path)

          if not candidates:
              print("No distributable bundles found", file=sys.stderr)
              sys.exit(1)

          seen = {}
          for path in candidates:
              name = path.name
              if name in seen:
                  print(f"Duplicate release asset name detected: {name}", file=sys.stderr)
                  print(f" - {seen[name]}", file=sys.stderr)
                  print(f" - {path}", file=sys.stderr)
                  sys.exit(1)
              seen[name] = path

          out_dir = Path("release-dist")
          out_dir.mkdir(exist_ok=True)
          for path in sorted(candidates):
              target = out_dir / path.name
              shutil.copy2(path, target)
              print(target.as_posix())
          PY

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: release-dist/*
          if-no-files-found: error
          retention-days: 7

  publish-release:
    needs: build-bundles
    runs-on: ubuntu-latest

    steps:
      - name: Download bundle artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: bundle-*
          path: release-assets
          merge-multiple: true

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          cat > release-notes.md <<'NOTES'
          Automated build for pot-withPDF.

          This project is an unofficial fork of pot-app/pot-desktop.
          NOTES

          if gh release view "$TAG_NAME" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --repo "$GH_REPO" --title "pot-withPDF $TAG_NAME" --notes-file release-notes.md
          else
            gh release create "$TAG_NAME" --repo "$GH_REPO" --title "pot-withPDF $TAG_NAME" --notes-file release-notes.md
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          python3 - <<'PY'
          import json
          import os
          from pathlib import Path
          import sys
          import urllib.error
          import urllib.parse
          import urllib.request

          token = os.environ["GH_TOKEN"]
          repo = os.environ["GH_REPO"]
          tag = os.environ["TAG_NAME"]

          headers = {
              "Authorization": f"Bearer {token}",
              "Accept": "application/vnd.github+json",
              "X-GitHub-Api-Version": "2022-11-28",
              "User-Agent": "pot-withPDF-release-workflow",
          }

          def api(url, method="GET", data=None, content_type=None):
              request_headers = headers.copy()
              if content_type:
                  request_headers["Content-Type"] = content_type
              request = urllib.request.Request(url, data=data, headers=request_headers, method=method)
              try:
                  with urllib.request.urlopen(request) as response:
                      return response.read()
              except urllib.error.HTTPError as error:
                  body = error.read().decode("utf-8", "ignore")
                  print(f"::error::HTTP {error.code} for {method} {url}", file=sys.stderr)
                  if body:
                      print(f"::error::{body}", file=sys.stderr)
                  raise
              except Exception as error:  # pragma: no cover - workflow diagnostics
                  print(f"::error::{type(error).__name__}: {error}", file=sys.stderr)
                  raise

          files = sorted(path for path in Path("release-assets").rglob("*") if path.is_file())
          if not files:
              print("No release assets found after downloading bundle artifacts", file=sys.stderr)
              sys.exit(1)

          file_names = [path.name for path in files]
          duplicates = sorted({name for name in file_names if file_names.count(name) > 1})
          if duplicates:
              print(f"::error::Duplicate release asset names detected: {', '.join(duplicates)}", file=sys.stderr)
              sys.exit(1)

          print("release asset candidates:")
          for path in files:
              print(f" - {path.name}")

          release_bytes = api(
              f"https://api.github.com/repos/{repo}/releases/tags/{urllib.parse.quote(tag)}"
          )
          release = json.loads(release_bytes)
          upload_url = release["upload_url"].split("{", 1)[0]
          existing_assets = {asset["name"]: asset["id"] for asset in release.get("assets", [])}

          for path in files:
              asset_name = path.name
              if asset_name in existing_assets:
                  api(
                      f"https://api.github.com/repos/{repo}/releases/assets/{existing_assets[asset_name]}",
                      method="DELETE",
                  )

              with path.open("rb") as file_handle:
                  payload = file_handle.read()

              asset_url = f"{upload_url}?name={urllib.parse.quote(asset_name)}"
              uploaded = json.loads(
                  api(asset_url, method="POST", data=payload, content_type="application/octet-stream")
              )
              print(f"uploaded {uploaded['name']} ({uploaded['size']} bytes)")

          verify_bytes = api(
              f"https://api.github.com/repos/{repo}/releases/tags/{urllib.parse.quote(tag)}"
          )
          verified_release = json.loads(verify_bytes)
          uploaded_names = [asset["name"] for asset in verified_release.get("assets", [])]

          if not uploaded_names:
              print("GitHub release still has no custom assets after upload", file=sys.stderr)
              sys.exit(1)

          print("release assets:")
          for name in uploaded_names:
              print(f" - {name}")
          PY
