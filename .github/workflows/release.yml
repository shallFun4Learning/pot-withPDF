name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-bundles:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            args: ''
            artifact_name: bundle-ubuntu
            bundle_glob: src-tauri/target/release/bundle/**/*
          - platform: windows-latest
            args: ''
            artifact_name: bundle-windows
            bundle_glob: src-tauri/target/release/bundle/**/*
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
            artifact_name: bundle-macos-x86_64
            bundle_glob: src-tauri/target/x86_64-apple-darwin/release/bundle/**/*
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'
            artifact_name: bundle-macos-aarch64
            bundle_glob: src-tauri/target/aarch64-apple-darwin/release/bundle/**/*

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20
          cache: pnpm

      - name: Install pnpm globally
        run: |
          npm install -g pnpm@9
          pnpm --version

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: runner.os == 'macOS'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target
            ./src-tauri/crates/pdf_io -> target

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libsoup2.4-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish hygiene check
        run: pnpm run check:publish

      - name: Build Tauri bundles
        run: pnpm tauri build ${{ matrix.args }}

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.bundle_glob }}
          if-no-files-found: error
          retention-days: 7

  publish-release:
    needs: build-bundles
    runs-on: ubuntu-latest

    steps:
      - name: Download bundle artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: bundle-*
          path: release-assets
          merge-multiple: true

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: pot-withPDF ${{ github.ref_name }}
          body: |
            Automated build for pot-withPDF.

            This project is an unofficial fork of pot-app/pot-desktop.
          files: release-assets/**/*
          draft: false
          prerelease: false
