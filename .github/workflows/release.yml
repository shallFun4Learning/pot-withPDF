name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-bundles:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            artifact_name: bundle-ubuntu
            bundle_glob: src-tauri/target/release/bundle/**/*
          - platform: windows-latest
            artifact_name: bundle-windows
            bundle_glob: src-tauri/target/release/bundle/**/*
          - platform: macos-latest
            artifact_name: bundle-macos
            bundle_glob: src-tauri/target/release/bundle/**/*

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install pnpm globally
        run: |
          npm install -g pnpm@9
          pnpm --version

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target
            ./src-tauri/crates/pdf_io -> target

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libsoup2.4-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish hygiene check
        run: pnpm run check:publish

      - name: Build Tauri bundles (Linux)
        if: runner.os == 'Linux'
        run: ./scripts/tauri-build-linux.sh

      - name: Build Tauri bundles (macOS/Windows)
        if: runner.os != 'Linux'
        run: pnpm tauri build

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: ${{ matrix.bundle_glob }}
          if-no-files-found: error
          retention-days: 7

  publish-release:
    needs: build-bundles
    runs-on: ubuntu-latest

    steps:
      - name: Download bundle artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: bundle-*
          path: release-assets
          merge-multiple: true

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          cat > release-notes.md <<'NOTES'
          Automated build for pot-withPDF.

          This project is an unofficial fork of pot-app/pot-desktop.
          NOTES

          if gh release view "$TAG_NAME" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --repo "$GH_REPO" --title "pot-withPDF $TAG_NAME" --notes-file release-notes.md
          else
            gh release create "$TAG_NAME" --repo "$GH_REPO" --title "pot-withPDF $TAG_NAME" --notes-file release-notes.md
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          mapfile -t files < <(find release-assets -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "No release assets found" >&2
            exit 1
          fi
          gh release upload "$TAG_NAME" --repo "$GH_REPO" "${files[@]}" --clobber
