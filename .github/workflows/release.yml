name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  build-bundles:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            artifact_name: bundle-ubuntu
          - platform: windows-latest
            artifact_name: bundle-windows
          - platform: macos-latest
            artifact_name: bundle-macos

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: 20

      - name: Install pnpm globally
        run: |
          npm install -g pnpm@9
          pnpm --version

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target
            ./src-tauri/crates/pdf_io -> target

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libsoup2.4-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish hygiene check
        run: pnpm run check:publish

      - name: Build Tauri bundles (Linux)
        if: runner.os == 'Linux'
        run: ./scripts/tauri-build-linux.sh

      - name: Build Tauri bundles (macOS/Windows)
        if: runner.os != 'Linux'
        run: pnpm tauri build

      - name: Collect distributable bundles
        shell: bash
        run: |
          python3 - <<'PY'
          from pathlib import Path
          import shutil
          import sys

          root = Path("src-tauri/target/release/bundle")
          if not root.exists():
              print("Bundle directory does not exist", file=sys.stderr)
              sys.exit(1)

          allowed_suffixes = (
              ".AppImage",
              ".deb",
              ".rpm",
              ".dmg",
              ".msi",
              ".exe",
              ".zip",
              ".tar.gz",
              ".pkg",
          )
          excluded_names = {"control.tar.gz", "data.tar.gz", "debian-binary"}
          excluded_fragments = (".app/", "AppDir/")

          candidates = []
          for path in root.rglob("*"):
              if not path.is_file():
                  continue

              rel = path.as_posix()
              if any(fragment in rel for fragment in excluded_fragments):
                  continue
              if path.name in excluded_names:
                  continue
              if rel.endswith(allowed_suffixes):
                  candidates.append(path)

          if not candidates:
              print("No distributable bundles found", file=sys.stderr)
              sys.exit(1)

          seen = {}
          for path in candidates:
              name = path.name
              if name in seen:
                  print(f"Duplicate release asset name detected: {name}", file=sys.stderr)
                  print(f" - {seen[name]}", file=sys.stderr)
                  print(f" - {path}", file=sys.stderr)
                  sys.exit(1)
              seen[name] = path

          out_dir = Path("release-dist")
          out_dir.mkdir(exist_ok=True)
          for path in sorted(candidates):
              target = out_dir / path.name
              shutil.copy2(path, target)
              print(target.as_posix())
          PY

      - name: Upload bundle artifacts
        uses: actions/upload-artifact@v6
        with:
          name: ${{ matrix.artifact_name }}
          path: release-dist/*
          if-no-files-found: error
          retention-days: 7

  publish-release:
    needs: build-bundles
    runs-on: ubuntu-latest

    steps:
      - name: Download bundle artifacts
        uses: actions/download-artifact@v5
        with:
          pattern: bundle-*
          path: release-assets
          merge-multiple: true

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          cat > release-notes.md <<'NOTES'
          Automated build for pot-withPDF.

          This project is an unofficial fork of pot-app/pot-desktop.
          NOTES

          if gh release view "$TAG_NAME" --repo "$GH_REPO" >/dev/null 2>&1; then
            gh release edit "$TAG_NAME" --repo "$GH_REPO" --title "pot-withPDF $TAG_NAME" --notes-file release-notes.md
          else
            gh release create "$TAG_NAME" --repo "$GH_REPO" --title "pot-withPDF $TAG_NAME" --notes-file release-notes.md
          fi

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
          TAG_NAME: ${{ github.ref_name }}
        shell: bash
        run: |
          mapfile -t files < <(find release-assets -type f | sort)
          if [ "${#files[@]}" -eq 0 ]; then
            echo "::error::No release assets found after downloading bundle artifacts" >&2
            exit 1
          fi

          mapfile -t duplicate_names < <(printf '%s\n' "${files[@]##*/}" | sort | uniq -d)
          if [ "${#duplicate_names[@]}" -gt 0 ]; then
            echo "::error::Duplicate release asset names detected: ${duplicate_names[*]}" >&2
            exit 1
          fi

          echo "release asset candidates:"
          printf ' - %s\n' "${files[@]##*/}"

          for attempt in $(seq 1 15); do
            if gh release view "$TAG_NAME" --repo "$GH_REPO" --json uploadUrl >/tmp/release.json 2>/tmp/release.err; then
              break
            fi

            if [ "$attempt" -eq 15 ]; then
              echo "::error::$(cat /tmp/release.err)" >&2
              exit 1
            fi

            echo "release not ready yet, retrying ($attempt/15)"
            sleep 3
          done

          gh release upload "$TAG_NAME" --repo "$GH_REPO" "${files[@]}" --clobber

          asset_count="$(gh release view "$TAG_NAME" --repo "$GH_REPO" --json assets --jq '.assets | length')"
          if [ "${asset_count:-0}" -lt 3 ]; then
            echo "::error::GitHub release has fewer than 3 distributable assets after upload" >&2
            exit 1
          fi

          mapfile -t uploaded_asset_names < <(gh release view "$TAG_NAME" --repo "$GH_REPO" --json assets --jq '.assets[].name')

          cat > release-notes.md <<'NOTES'
          Automated build for pot-withPDF.

          This project is an unofficial fork of pot-app/pot-desktop.

          ## Downloads
          NOTES

          for asset_name in "${uploaded_asset_names[@]}"; do
            printf -- '- [%s](https://github.com/%s/releases/download/%s/%s)\n' \
              "$asset_name" \
              "$GH_REPO" \
              "$TAG_NAME" \
              "$asset_name" >> release-notes.md
          done

          gh release edit "$TAG_NAME" --repo "$GH_REPO" --notes-file release-notes.md

          echo "release assets:"
          printf ' - %s\n' "${uploaded_asset_names[@]}"
