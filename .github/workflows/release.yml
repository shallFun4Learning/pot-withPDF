name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-24.04
            args: ''
          - platform: windows-latest
            args: ''
          - platform: macos-latest
            args: '--target x86_64-apple-darwin'
          - platform: macos-latest
            args: '--target aarch64-apple-darwin'

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Setup pnpm via corepack
        run: |
          corepack enable
          corepack prepare pnpm@9 --activate
          pnpm --version

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Add macOS targets
        if: runner.os == 'macOS'
        run: rustup target add x86_64-apple-darwin aarch64-apple-darwin

      - name: Restore Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: |
            ./src-tauri -> target
            ./src-tauri/crates/pdf_io -> target

      - name: Install Linux native dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libssl-dev \
            libgtk-3-dev \
            libjavascriptcoregtk-4.1-dev \
            libwebkit2gtk-4.1-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libxdo-dev \
            libsoup2.4-dev

      - name: Install frontend dependencies
        run: pnpm install --frozen-lockfile

      - name: Publish hygiene check
        run: pnpm run check:publish

      - name: Set Tauri CLI path (Unix)
        if: runner.os != 'Windows'
        run: echo "TAURI_SCRIPT=${GITHUB_WORKSPACE}/node_modules/.bin/tauri" >> "$GITHUB_ENV"

      - name: Set Tauri CLI path (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: echo "TAURI_SCRIPT=${env:GITHUB_WORKSPACE}\node_modules\.bin\tauri.CMD" >> $env:GITHUB_ENV

      - name: Build Tauri bundles and create release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: pot-withPDF ${{ github.ref_name }}
          releaseBody: |
            Automated build for pot-withPDF.

            This project is an unofficial fork of pot-app/pot-desktop.
          releaseDraft: false
          prerelease: false
          uploadUpdaterJson: false
          tauriScript: ${{ env.TAURI_SCRIPT }}
          args: ${{ matrix.args }}
