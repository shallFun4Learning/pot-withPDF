name: CI

on:
    push:
        branches:
            - master
            - main
    pull_request:

permissions:
    contents: read

jobs:
    test-and-smoke-build:
        strategy:
            fail-fast: false
            matrix:
                os: [ubuntu-24.04, windows-latest, macos-latest]

        runs-on: ${{ matrix.os }}

        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Setup Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: 20
                  cache: pnpm

            - name: Install pnpm globally
              run: |
                  npm install -g pnpm@9
                  pnpm --version

            - name: Install Rust stable
              uses: dtolnay/rust-toolchain@stable

            - name: Install Linux native dependencies
              if: runner.os == 'Linux'
              run: |
                  sudo apt-get update
                  sudo apt-get install -y \
                    libssl-dev \
                    libgtk-3-dev \
                    libjavascriptcoregtk-4.1-dev \
                    libwebkit2gtk-4.1-dev \
                    libayatana-appindicator3-dev \
                    librsvg2-dev \
                    patchelf \
                    libxdo-dev \
                    libsoup2.4-dev

            - name: Install frontend dependencies
              run: pnpm install --frozen-lockfile

            - name: Install Playwright Chromium
              run: pnpm exec playwright install chromium

            - name: Publish hygiene check
              run: pnpm run check:publish

            - name: Frontend tests
              run: pnpm test

            - name: Frontend build smoke
              run: pnpm build

            - name: Cargo test (Linux)
              if: runner.os == 'Linux'
              shell: bash
              run: |
                  ./scripts/cargo-linux.sh test --manifest-path src-tauri/Cargo.toml
                  cargo test --manifest-path src-tauri/crates/pdf_io/Cargo.toml

            - name: Cargo check (Linux)
              if: runner.os == 'Linux'
              shell: bash
              run: |
                  ./scripts/cargo-linux.sh check --manifest-path src-tauri/Cargo.toml
                  cargo check --manifest-path src-tauri/crates/pdf_io/Cargo.toml

            - name: Cargo test (macOS/Windows)
              if: runner.os != 'Linux'
              shell: bash
              run: |
                  cargo test --manifest-path src-tauri/Cargo.toml
                  cargo test --manifest-path src-tauri/crates/pdf_io/Cargo.toml

            - name: Cargo check (macOS/Windows)
              if: runner.os != 'Linux'
              shell: bash
              run: |
                  cargo check --manifest-path src-tauri/Cargo.toml
                  cargo check --manifest-path src-tauri/crates/pdf_io/Cargo.toml
